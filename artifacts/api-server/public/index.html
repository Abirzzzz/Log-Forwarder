<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Message</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo svg { flex-shrink: 0; }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .logo-sub {
      font-size: 0.78rem;
      color: #555;
      margin-top: 1px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.92rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus {
      border-color: #5865f2;
    }

    input::placeholder, textarea::placeholder {
      color: #3a3a3a;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.5;
    }

    .field { margin-bottom: 18px; }

    .hint {
      font-size: 0.72rem;
      color: #444;
      margin-top: 5px;
    }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    button {
      width: 100%;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #4752c4; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 7px;
      font-size: 0.85rem;
      display: none;
    }

    .status.success {
      background: #1a2b1a;
      border: 1px solid #2d5a2d;
      color: #6fcf6f;
      display: block;
    }

    .status.error {
      background: #2b1a1a;
      border: 1px solid #5a2d2d;
      color: #cf6f6f;
      display: block;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin: 22px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865f2"/>
      </svg>
      <div>
        <div class="logo-text">Message Sender</div>
        <div class="logo-sub">Send via selfbot</div>
      </div>
    </div>

    <hr class="divider" />

    <form id="form">
      <div class="row">
        <div class="field">
          <label for="channelId">Channel ID <span style="color:#cf6f6f">*</span></label>
          <input id="channelId" type="text" placeholder="123456789012345678" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="guildId">Server ID</label>
          <input id="guildId" type="text" placeholder="optional" autocomplete="off" />
          <div class="hint">Only needed if channel not in cache</div>
        </div>
      </div>

      <div class="field">
        <label for="message">Message <span style="color:#cf6f6f">*</span></label>
        <textarea id="message" placeholder="Type your message here…" required></textarea>
      </div>

      <button type="submit" id="btn">Send Message</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const channelId = document.getElementById('channelId').value.trim();
      const guildId = document.getElementById('guildId').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!channelId || !message) return;

      btn.disabled = true;
      btn.textContent = 'Sending…';
      statusEl.className = 'status';
      statusEl.textContent = '';

      try {
        const body = { channelId, message };
        if (guildId) body.guildId = guildId;

        const res = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.ok) {
          statusEl.className = 'status success';
          statusEl.textContent = '✓ Message sent successfully.';
          document.getElementById('message').value = '';
        } else {
          statusEl.className = 'status error';
          statusEl.textContent = '✗ ' + (data.error || 'Unknown error');
        }
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = '✗ Network error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
