kind = "web"
previewPath = "/"
title = "Message Sender"
version = "1.0.0"
id = "artifacts/sender"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18871

[services.development]
run = "pnpm --filter @workspace/sender run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sender", "run", "build" ]
publicDir = "artifacts/sender/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18871"
BASE_PATH = "/"
